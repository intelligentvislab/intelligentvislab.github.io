<svg xmlns="http://www.w3.org/2000/svg" width="900" height="630" viewBox="0 0 900 630">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f4e84"/>
      <stop offset="1" stop-color="#2b6cb0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="630" fill="#eef3fa"/>
  <!-- book cover -->
  <g>
    <rect x="285" y="45" width="360" height="540" rx="10" fill="url(#cover)"/>
    <rect x="285" y="45" width="26" height="540" rx="10" fill="#173d69"/>
    <text x="340" y="150" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Large</text>
    <text x="340" y="205" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Language</text>
    <text x="340" y="260" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Models for</text>
    <text x="340" y="315" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Information</text>
    <text x="340" y="370" font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Visualization</text>
    <g fill="#ffffff" opacity="0.55">
      <rect x="340" y="410" width="22" height="60" rx="4"/>
      <rect x="372" y="390" width="22" height="80" rx="4"/>
      <rect x="404" y="365" width="22" height="105" rx="4"/>
    </g>
    <text x="340" y="520" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#dbe7fa">Enamul Hoque</text>
    <text x="340" y="558" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#a9c4e8">Springer &#183; forthcoming</text>
  </g>
</svg>
