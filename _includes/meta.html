{% capture title %}{{ site.title }}{% if page.title %} - {{ page.title }}{% endif %}{% endcapture %}

<!-- https://metatags.io/ -->
<meta name="title" content="{{ title | strip }}" />
<meta name="description" content="{{ page.description }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:title" content="{{ title | strip }}" />
<meta property="og:description" content="{{ page.description }}" />
<meta property="twitter:card" content="summary_large_image" />
<meta property="twitter:url" content="{{ page.url | absolute_url }}" />
<meta property="twitter:title" content="{{ title | strip }}" />
<meta property="twitter:description" content="{{ page.description }}" />

<!-- RSS -->
<link
  rel="alternate"
  type="application/rss+xml"
  href="{{ '/feed.xml' | absolute_url }}"
/>

<!-- https://developers.google.com/web/fundamentals/native-hardware/click-to-call#disable_auto-detection_when_necessary -->
<meta name="format-detection" content="telephone=no" />
