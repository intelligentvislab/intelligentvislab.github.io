# List your resources here. Read by the resources list component.

# PARAMETERS:

# title:
# Heading to show

# type:
# An arbitrary type that the resource list component can filter by.

# image:
# Url to a striking image of the resource

# link:
# Url to link to

# description:
# Description text to show

# repo:
# A GitHub repo to automatically fetch tags (aka "topics") from.

- title: ChartQA
  type: benchmark
  image: images/publications/cqa.png
  link: https://github.com/vis-nlp/ChartQA
  repo: vis-nlp/ChartQA
  description: A benchmark for question answering about charts with visual and logical reasoning (ACL 2022). Widely adopted for evaluating chart understanding in multimodal AI systems.

- title: ChartQAPro
  type: benchmark
  image: images/publications/ChartQAPro.png
  link: https://github.com/vis-nlp/ChartQAPro
  repo: vis-nlp/ChartQAPro
  description: A more diverse and challenging benchmark for chart question answering, spanning 157 sources and varied chart types including infographics and dashboards (ACL 2025).

- title: Chart-to-Text
  type: benchmark
  image: images/publications/chart-sum.png
  link: https://github.com/vis-nlp/Chart-to-text
  repo: vis-nlp/Chart-to-text
  description: A large-scale benchmark for chart summarization with two datasets covering a broad range of chart types (ACL 2022).

- title: OpenCQA
  type: benchmark
  image: images/publications/OpenCQA.png
  link: https://github.com/vis-nlp/OpenCQA
  repo: vis-nlp/OpenCQA
  description: A benchmark for open-ended question answering with charts, where answers are explanatory texts (EMNLP 2022).

- title: Text2Vis
  type: benchmark
  image: images/publications/Text2Vis.png
  link: https://github.com/vis-nlp/Text2Vis
  repo: vis-nlp/Text2Vis
  description: A challenging and diverse benchmark for generating multimodal visualizations from natural language (EMNLP 2025).

- title: DashboardQA
  type: benchmark
  image: images/publications/dashboardqa.png
  link: https://github.com/vis-nlp/DashboardQA
  repo: vis-nlp/DashboardQA
  description: A benchmark for evaluating multimodal agents on question answering over interactive dashboards (EACL 2026).

- title: UniChart
  type: model
  image: images/publications/unichart.png
  link: https://github.com/vis-nlp/UniChart
  repo: vis-nlp/UniChart
  description: A universal vision-language pretrained model for chart comprehension and reasoning (EMNLP 2023).

- title: ChartGemma
  type: model
  image: images/publications/coling.png
  link: https://github.com/vis-nlp/chartgemma
  repo: vis-nlp/chartgemma
  description: A chart understanding and reasoning model built on PaliGemma, instruction-tuned directly from chart images (COLING 2025).

- title: ChartInstruct
  type: model
  image: images/publications/ChartInstruct_ACL.png
  link: https://github.com/vis-nlp/ChartInstruct
  repo: vis-nlp/ChartInstruct
  description: Instruction tuning for chart comprehension and reasoning, with a dataset of 191K instructions (ACL 2024).
