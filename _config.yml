# https://jekyllrb.com/docs/configuration/

# site-wide variables
title: Intelligent Visualization Lab # title of site, used in tab name and elsewhere
repository: intelligentvislab/intelligentvislab.github.io # used by jekyll-github-metadata (needed for local builds without a git remote)
email: enamulh@yorku.ca # default email
google: NySeLFcAAAAJ # default name to search on Google Scholar
github: enamulh # default GitHub user/org, without the @
twitter: Enamul_Hoque # default Twitter handle, without the @
#instagram: fakeinstagramhandle # default Instagram handle, without the @
#youtube: fakeyoutubechannel # default YouTube channel handle

# full URL where the site is hosted (used for absolute links in social/SEO metadata)
url: "https://intelligentvislab.github.io"

# base directory where site is hosted
# set to "" if hosting at a custom domain, eg yoursite.com
baseurl: "/"

# default front matter parameters for markdown files
# defaults can be overridden on a particular page, eg:
# ---
# description: Description unique to this page
# background: images/different-bg-for-this-page.jpg
# ---
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      description: The Intelligent Visualization Lab at York University develops multimodal AI, visualization, and natural language processing methods to make data interaction more accessible, responsible, and human-centered. # description that will show under search engine results
      background: images/test-tube.jpg # background image in header and footer
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_publications
  - scope:
      type: "publications"
    values:
      layout: publication
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  members:
    output: true
  publications:
    output: true
    permalink: /publications/:name/

# sass settings
sass:
  sass_dir: css

# syntax highlighting
highlighter: rouge

# working files that should not be published to the live site
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - HOW_TO_UPDATE.md
  - IMPROVEMENTS.md
  - Project_Breakdown.docx
  - index_orig_content.txt
  - debug.log
  - build.sh
  - start.sh
  - research/orignal_content.txt
  - blog/orig_template.txt

# build settings
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-sitemap  

# banner images
slideShow:
  - images/teaser1.png
  - images/teaser2.png
  - images/teaser3.png
